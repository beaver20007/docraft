name: ai-playbook CI

on:
  push:
    branches: [main]
    paths:
      - "apps/ai-playbook/**"
      - ".github/workflows/ai-playbook-ci.yml"
      - ".gitmodules"
  pull_request:
    branches: [main]
    paths:
      - "apps/ai-playbook/**"
      - ".github/workflows/ai-playbook-ci.yml"
      - ".gitmodules"
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    env:
      REDIS_URL: redis://localhost:6379
      APP_ENV: development
      ANTHROPIC_API_KEY: sk-test-placeholder
      OPENAI_API_KEY: sk-test-placeholder

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      # Checkout the ai-playbook-generator repo directly (not as submodule)
      # so we don't need cross-repo access from the docraft GITHUB_TOKEN.
      # GH_PAT secret must be set on the docraft repo if ai-playbook-generator is private.
      - uses: actions/checkout@v4
        with:
          repository: beaver20007/ai-playbook-generator
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          flags: api
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
