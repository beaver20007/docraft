<!-- DOCRAFT.pro Logo — Вариант #20 (рекомендованный основной)
     Использование: встраивается как inline SVG или img src

     Размеры:
       favicon:  16×16  → используй logo-mark-16.svg
       navbar:   32×32  → logo-mark-32.svg (этот файл, viewBox)
       hero:     48×48  → scale up
       og-image: 120×120 → scale up

     Цвета:
       Контур D:   #1A1A2E (stroke)
       Заливка D:  #6B5CE7 opacity 12% (fill)
       Линии:      #6B5CE7 (stroke, убывающий opacity)
       Бейдж:      #00BFA5 (fill)
       Галочка:    white (stroke)
-->

<!-- FULL LOGO (иконка + текст) — для navbar, хедеров -->
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="36" viewBox="0 0 160 36">
  <!-- Иконка -->
  <path d="M4 30 L4 6 L18 6 Q28 6 28 18 Q28 30 18 30 Z"
        fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linejoin="round"/>
  <path d="M9 10 L18 10 Q24 10 24 18 Q24 26 18 26 L9 26 Z"
        fill="#6B5CE7" opacity="0.12"/>
  <line x1="11" y1="14" x2="21" y2="14" stroke="#6B5CE7" stroke-width="1.5"
        stroke-linecap="round"/>
  <line x1="11" y1="18" x2="22" y2="18" stroke="#6B5CE7" stroke-width="1.5"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="22" x2="21" y2="22" stroke="#6B5CE7" stroke-width="1.5"
        stroke-linecap="round" opacity="0.45"/>
  <circle cx="28" cy="30" r="5" fill="#00BFA5"/>
  <path d="M25.5 30 L27.5 32 L31 28.5"
        stroke="white" stroke-width="1.4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Текст -->
  <text x="36" y="15" font-family="Epilogue, DM Sans, system-ui"
        font-size="13" font-weight="800" fill="#1A1A2E"
        letter-spacing="-0.3">DOCRAFT</text>
  <text x="107" y="15" font-family="Epilogue, DM Sans, system-ui"
        font-size="13" font-weight="400" fill="#00BFA5">.pro</text>
  <text x="36" y="28" font-family="DM Sans, system-ui"
        font-size="8" font-weight="400" fill="#888899"
        letter-spacing="0.06em">AI-POWERED DOCUMENTS</text>
</svg>
